<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Halaman Utama</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 500px;
      width: 90%;
    }

    h1 {
      font-size: 2rem;
      color: #2d6a4f;
      margin-bottom: 12px;
    }

    p {
      font-size: 1rem;
      color: #555;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    a {
      display: inline-block;
      padding: 10px 24px;
      background: #2d6a4f;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s;
    }

    a:hover {
      background: #1b4332;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Selamat Datang! 👋</h1>
    <p>Ini adalah halaman HTML sederhana. Kamu bisa mulai mengedit file ini sesuai kebutuhanmu.</p>
    <a href="#">Mulai Sekarang</a>
  </div>
</body>
</html>
